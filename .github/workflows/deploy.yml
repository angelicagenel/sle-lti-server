name: Deploy to Cloud Run
on:
  push:
    branches: [main]
env:
  PROJECT_ID: sle-lti-server
  SERVICE_NAME: sle-lti-server
  REGION: us-central1
  SA_EMAIL: sle-lti-service-for-claude@sle-lti-server.iam.gserviceaccount.com
  IMAGE: us-central1-docker.pkg.dev/sle-lti-server/cloud-run-source-deploy/sle-lti-server

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Create Artifact Registry repository
        run: |
          gcloud artifacts repositories create cloud-run-source-deploy \
            --repository-format=docker \
            --location=us-central1 \
            --description="Cloud Run source deploy" \
          || true

      - name: Build and push Docker image
        run: |
          gcloud builds submit \
            --tag $IMAGE \
            --service-account=projects/sle-lti-server/serviceAccounts/$SA_EMAIL \
            --default-buckets-behavior=REGIONAL_USER_OWNED_BUCKET

      - name: Deploy to Cloud Run
        run: gcloud run deploy $SERVICE_NAME --image $IMAGE --platform managed --region $REGION --allow-unauthenticated --service-account=$SA_EMAIL --set-env-vars FLASK_SECRET_KEY=${{ secrets.FLASK_SECRET_KEY }},DEFAULT_WORKBOOK_URL=${{ secrets.DEFAULT_WORKBOOK_URL }} --set-secrets SECRET_PRIVATE_KEY=RSA_PRIVATE_KEY:latest,SECRET_PUBLIC_KEY=RSA_PUBLIC_KEY:latest

      - name: Get service URL
        run: |
          gcloud run services describe $SERVICE_NAME \
            --platform managed \
            --region $REGION \
            --format 'value(status.url)'
