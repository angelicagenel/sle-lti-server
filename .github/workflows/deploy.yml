name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: sle-lti-server
  SERVICE_NAME: sle-lti-server
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push Docker image
        run: gcloud builds submit --tag gcr.io/$PROJECT_ID/$SERVICE_NAME --suppress-logs

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image gcr.io/$PROJECT_ID/$SERVICE_NAME \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --set-env-vars FLASK_SECRET_KEY=${{ secrets.FLASK_SECRET_KEY }} \
            --set-env-vars DEFAULT_WORKBOOK_URL=${{ secrets.DEFAULT_WORKBOOK_URL }} \
            --set-env-vars SECRET_PRIVATE_KEY=${{ secrets.RSA_PRIVATE_KEY }} \
            --set-env-vars SECRET_PUBLIC_KEY=${{ secrets.RSA_PUBLIC_KEY }}

      - name: Get service URL
        run: |
          gcloud run services describe $SERVICE_NAME \
            --platform managed --region $REGION \
            --format 'value(status.url)'
